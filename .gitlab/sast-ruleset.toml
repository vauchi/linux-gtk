# Custom Semgrep SAST configuration
# Security rules only — quality rules (CC-03, CC-06) excluded from dashboard.
# Quality rules for local use: semgrep --config scripts/semgrep-rules/vauchi-quality.yml .

[semgrep]
  description = "Semgrep with Rust community + vauchi security rules"

  # Disable eprintln-in-lib: this is a binary-only crate (no lib.rs).
  # eprintln! calls are startup diagnostics and error recovery output for a GTK app.
  # See: https://gitlab.com/groups/vauchi/-/security/vulnerabilities?severity=MEDIUM
  [[semgrep.ruleset]]
    disable = true
    [semgrep.ruleset.identifier]
      type = "semgrep_id"
      value = "vauchi-no-eprintln-in-lib"

  [[semgrep.passthrough]]
    type = "url"
    value = "https://semgrep.dev/c/p/rust"
    target = "semgrep-rust-community.yml"

  [[semgrep.passthrough]]
    type = "url"
    value = "https://gitlab.com/api/v4/projects/77957857/repository/files/semgrep-rules%2Fvauchi-security.yml/raw?ref=main"
    target = "semgrep-vauchi-security.yml"

