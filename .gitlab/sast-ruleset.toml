# Custom Semgrep SAST configuration
# Adds Rust community rules + vauchi security rules.
#
# NOTE: Currently points to vauchi-rust.yml (combined security+quality).
# After scripts !142 merges, switch to vauchi-security.yml to exclude
# quality rules (CC-03, CC-06) from the Security Dashboard.
#
# Quality rules for local use:
#   semgrep --config scripts/semgrep-rules/vauchi-quality.yml .

[semgrep]
  description = "Semgrep with Rust community + vauchi custom rules"

  [[semgrep.passthrough]]
    type = "url"
    value = "https://semgrep.dev/c/p/rust"
    target = "semgrep-rust-community.yml"

  [[semgrep.passthrough]]
    type = "url"
    value = "https://gitlab.com/vauchi/scripts/-/raw/main/semgrep-rules/vauchi-rust.yml"
    target = "semgrep-vauchi-custom.yml"

