# Custom Semgrep SAST configuration
# Adds Rust community rules (GitLab ships no Rust rules by default).
# See: https://semgrep.dev/p/rust
#
# After scripts/ MR merges, add custom vauchi rules:
#   [[semgrep.passthrough]]
#     type = "url"
#     value = "https://gitlab.com/vauchi/scripts/-/raw/main/semgrep-rules/vauchi-rust.yml"
#     target = "semgrep-vauchi-custom.yml"

[semgrep]
  description = "Semgrep with Rust community rules"

  [[semgrep.passthrough]]
    type = "url"
    value = "https://semgrep.dev/c/p/rust"
    target = "semgrep-rust-community.yml"

