# GitLab CI for vauchi-gtk (Linux GTK4 frontend)
#
# Uses shared templates from vauchi/scripts for self-hosted runner setup,
# caching, and change-based rules.

include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/rust-base.yml'
      - '/ci-templates/security.yml'
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/downstream.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/perf.yml'
      - '/ci-templates/design-drift.yml'
      - '/ci-templates/inventory-check.yml'
      - '/ci-templates/removed-symbols.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/github-mirror.yml'

stages:
  - lint
  - build
  - test
  - security
  - verify
  - deploy

# Duplicate dependency check (advisory)
lint:duplicates:
  extends: [.linux-runner-nocache, .lint-duplicates-job, .timeout-quick]

# Unused dependency check (advisory)
lint:machete:
  extends: [.linux-runner-nocache, .lint-machete-job, .timeout-quick]

lint:format:
  extends: [.linux-runner, .lint-format, .validation-rust, .timeout-quick]

lint:clippy:
  extends: [.linux-runner, .lint-clippy, .validation-rust, .timeout-standard]
  needs:
    - job: lint:format
      optional: true
  before_script:
    - !reference [.self-hosted, before_script]

build:app:
  extends: [.linux-runner, .timeout-standard]
  stage: build
  needs:
    - job: lint:format
      optional: true
  before_script:
    - !reference [.self-hosted, before_script]
  script:
    - cargo build --release
  artifacts:
    paths:
      - target/release/vauchi-gtk
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.rs"
          - "**/Cargo.toml"
          - "**/Cargo.lock"
          - ".gitlab-ci.yml"
          - "rust-toolchain.toml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:unit:
  extends: [.linux-runner, .timeout-standard]
  stage: test
  needs:
    - job: lint:format
      optional: true
  before_script:
    - !reference [.self-hosted, before_script]
  script:
    - cargo test
  # GTK4 dev libs required on runners — enforced to surface infra gaps
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.rs"
          - "**/Cargo.toml"
          - "**/Cargo.lock"
          - ".gitlab-ci.yml"
          - "rust-toolchain.toml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# AT-SPI accessibility + widget tree tests
test:a11y:
  stage: test
  needs:
    - job: build:app
      optional: true
  tags: [linux, self-hosted]
  script:
    - chmod +x tests/atspi/run-tests.sh
    - tests/atspi/run-tests.sh -v --tb=short -k "not test_snapshots"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src/**"
          - "tests/atspi/**"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Visual snapshot regression — captures each screen under Xvfb and
# compares against committed baselines using ImageMagick compare.
# First run: generates baselines (skips, does not fail).
# Subsequent runs: diffs against baselines, fails on visual regression.
# To regenerate: UPDATE_SNAPSHOTS=1 ./run-tests.sh -k test_snapshots
test:snapshots:
  stage: test
  needs:
    - job: build:app
      optional: true
  tags: [linux, self-hosted]
  script:
    - chmod +x tests/atspi/run-tests.sh
    - tests/atspi/run-tests.sh -v --tb=short -k "test_snapshots"
  artifacts:
    when: always
    paths:
      - tests/atspi/snapshots/baseline/
      - tests/atspi/snapshots/actual/
      - tests/atspi/snapshots/diff/
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src/**"
          - "tests/atspi/**"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Manual snapshot regeneration — run via GitLab UI to update baselines.
# Trigger: Pipelines → Run pipeline → REGENERATE_SNAPSHOTS=1
test:snapshots:record:
  stage: test
  needs:
    - job: build:app
      optional: true
  tags: [linux, self-hosted]
  variables:
    UPDATE_SNAPSHOTS: "1"
  script:
    - chmod +x tests/atspi/run-tests.sh
    - tests/atspi/run-tests.sh -v --tb=short -k "test_snapshots"
  artifacts:
    when: always
    paths:
      - tests/atspi/snapshots/baseline/
    expire_in: 90 days
  rules:
    - if: $REGENERATE_SNAPSHOTS == "1"
      when: manual

# ============================================================
# Security Stage (change-based, parallel with test)
# ============================================================

# Semgrep SAST: gate on Rust changes
semgrep-sast:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.rs"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Rust security audit (runs on dependency changes)
security:audit:
  extends: [.linux-runner-readonly, .security-audit-job]

# Full cargo-deny check: advisories, licenses, bans, sources
security:deny:
  extends: [.linux-runner-readonly, .security-deny-job]

# Binary size tracking (main merges + release tags)
perf:binary-size:
  extends: [.binary-size-tracking-job, .linux-runner, .timeout-long]
  before_script:
    - !reference [.self-hosted, before_script]
  variables:
    BINARY_SIZE_REPO_LABEL: "linux-gtk"

# ============================================================
# Verify Stage (upstream trigger only)
# ============================================================
# Runs when core merges to main and triggers this repo via
# verify:downstream-rust. Verifies this repo builds and tests
# pass against the updated vauchi-core.

# Design drift: verify all design-spec components are implemented
check:design-drift:
  extends: .design-drift-job
  variables:
    DESIGN_DRIFT_COMPONENT_DIR: "src/core_ui/components"

# Inventory check: verify INVENTORY.md matches filesystem
check:inventory:
  extends: .inventory-check-job
  variables:
    COMPONENT_DIR: "src/core_ui/components"
    COMPONENT_EXT: ".rs"

# Removed symbols: detect stale references to removed features
check:removed-symbols:
  extends: .removed-symbols-job
  variables:
    SEARCH_DIRS: "src/ tests/ design/"
verify:upstream-compat:
  extends: [.linux-runner, .verify-on-upstream, .timeout-standard]
  stage: verify
  needs: []
  before_script:
    - !reference [.self-hosted, before_script]
    - sudo apt-get update -qq && sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev 2>/dev/null || true
  script:
    - cargo test
  allow_failure: true  # GTK4 dev libs may not be on all runners

# Runs when core creates a dev/RC tag and triggers this repo.
# Verifies this repo builds and tests pass against the core tag.
verify:upstream-prerelease:
  extends: [.linux-runner, .verify-on-upstream-prerelease, .timeout-standard]
  stage: verify
  needs: []
  before_script:
    - !reference [.self-hosted, before_script]
    - sudo apt-get update -qq && sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev 2>/dev/null || true
  script:
    - cargo test
  allow_failure: true  # GTK4 dev libs may not be on all runners

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
