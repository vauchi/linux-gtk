# GitLab CI for vauchi-gtk (Linux GTK4 frontend)
#
# Uses shared templates from vauchi/scripts for self-hosted runner setup,
# caching, and change-based rules.

include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/rust-base.yml'
      - '/ci-templates/security.yml'
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/downstream.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/perf.yml'
      - '/ci-templates/design-drift.yml'
      - '/ci-templates/parser-parity.yml'
      - '/ci-templates/removed-symbols.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/freshness.yml'
      - '/ci-templates/github-mirror.yml'
      - '/ci-templates/vrt-upload.yml'
      - '/ci-templates/coverage.yml'

stages:
  - lint
  - build
  - test
  - security
  - verify
  - package
  - deploy

# Always-on gate for docs-only MRs. Every other job is change-gated to
# code paths (src/**/*.rs, Cargo.toml, …), so a documentation-only MR
# matches none of them and produces an empty pipeline — which GitLab
# marks "failed" and, with only_allow_merge_if_pipeline_succeeds, blocks
# the merge. This job runs on every MR so docs changes get a green
# pipeline. See vauchi/linux-gtk!136.
docs:gate:
  stage: lint
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/alpine:3.21
  tags: [docker]
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - echo "Non-code change — code gates intentionally skipped; docs MR may merge."

# Blocks MRs with non-main branch refs in Cargo.toml git dependencies.
check:branch-refs:
  extends: .check-git-branch-refs

# Duplicate dependency check (advisory)
lint:duplicates:
  extends: [.linux-runner-nocache, .lint-duplicates-job, .timeout-quick]

# Unused dependency check (advisory)
lint:machete:
  extends: [.linux-runner-nocache, .lint-machete-job, .timeout-quick]

lint:format:
  extends: [.linux-runner, .lint-format, .validation-rust, .timeout-quick]

lint:clippy:
  extends: [.linux-runner, .lint-clippy, .validation-rust, .timeout-standard]
  needs: []
  before_script:
    - !reference [.self-hosted, before_script]

# Locale key coverage — extract i18n keys referenced in Rust source
# (`vauchi_app::i18n::get_string("…")`) and verify each one exists in
# `en.json`. Catches typos and stale call sites before they ship as
# the runtime fallback `Missing: <key>`.
#
# Pattern mirrors `vauchi/core!777`: alpine + apk add the tools, clone
# `vauchi/locales`, run script via positional API. Inline clone since
# linux-gtk's CI doesn't include `content-fetch.yml` (no
# `.clone-locales` template available).
#
# All 32 referenced keys exist across en/de/fr/es/it after the
# `platform.*` namespace landed in `vauchi/locales!60` (19 BLE /
# NFC / QR / audio / button strings). The gate now blocks: any
# new typo or stale call site fails the MR pipeline instead of
# shipping as the runtime fallback `Missing: <key>` from
# `vauchi_app::i18n::get_string`.
#
# Variable-key call sites (`get_string(locale, &computed_key)`) are
# statically unreachable and not validated here — covered by test
# discipline + runtime fallback.
#
# Wired 2026-05-08 as Phase 4-linux-gtk of
# `_private!2026-05-08-locale-key-coverage-fanout-linux-gtk`;
# tightened to blocking in this MR after `locales!60` merged.
lint:locale-key-coverage:
  stage: lint
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/alpine:3.21
  tags: [docker]
  needs: []
  before_script:
    - apk add --no-cache bash ripgrep jq git findutils
    # Always start from a fresh clone of locales/main. GitLab runners
    # preserve `../locales` across job retries on the same machine, and
    # `git fetch --depth=1 + reset --hard origin/main` (the previous
    # cache-friendly path) does NOT reliably refresh the worktree to
    # the new tip — `git reset --hard` reports success while the
    # on-disk `en.json` still reflects the cached pre-fetch state.
    # Pipeline 2529593186 hit exactly this on MR !122: failed run and
    # retry both checked out `140f679` per the trace, but the failed
    # run's `en.json` was missing keys the retry's had. The 5 MB
    # re-clone takes ~2 s; cache-trust is not worth the flake.
    - |
      rm -rf ../locales
      git clone --depth=1 https://gitlab.com/vauchi/locales.git ../locales
  script:
    - bash ../locales/scripts/check-locale-key-coverage.sh
        src ../locales '*.rs'
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src/**/*.rs"
          - ".gitlab-ci.yml"

build:app:
  extends: [.linux-runner, .timeout-standard]
  stage: build
  needs:
    - job: lint:format
      optional: true
  before_script:
    - !reference [.self-hosted, before_script]
  script:
    - cargo build --release
  artifacts:
    paths:
      - target/release/gvauchi
      - target/release/seed-identity
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.rs"
          - "**/Cargo.toml"
          - "**/Cargo.lock"
          - ".gitlab-ci.yml"
          - "rust-toolchain.toml"
          # test:a11y and test:snapshots `needs: build:app` (not optional),
          # so build:app must also fire when only the AT-SPI harness under
          # tests/atspi/** changes. Without this path, an AT-SPI-only MR
          # produces a zero-job pipeline (GitLab marks the pipeline failed).
          - "tests/atspi/**"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:unit:
  extends: [.linux-runner, .timeout-standard]
  stage: test
  needs:
    - job: lint:format
      optional: true
  before_script:
    - !reference [.self-hosted, before_script]
  script:
    - cargo nextest run --profile ci
  # GTK4 dev libs required on runners — enforced to surface infra gaps
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.rs"
          - "**/Cargo.toml"
          - "**/Cargo.lock"
          - ".gitlab-ci.yml"
          - "rust-toolchain.toml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# AT-SPI accessibility + widget tree tests
test:a11y:
  stage: test
  needs:
    - job: build:app
  tags: [linux, self-hosted]
  script:
    - chmod +x tests/atspi/run-tests.sh
    - tests/atspi/run-tests.sh -v --tb=short -k "not test_snapshots"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src/**"
          - "tests/atspi/**"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Visual snapshot regression — captures each screen under Xvfb and
# compares against committed baselines using ImageMagick compare.
# First run: generates baselines (skips, does not fail).
# Subsequent runs: diffs against baselines, fails on visual regression.
# To regenerate: UPDATE_SNAPSHOTS=1 ./run-tests.sh -k test_snapshots
#
# The 2026-04 AT-SPI navigate-action no-op (problem record
# `2026-05-16-linux-gtk-atspi-sidebar-navigate`) is FIXED: each sidebar
# label is now wrapped in a flat `Button` (which exposes a working
# AT-SPI "click" action), with activation deferred to an idle tick to
# avoid the mid-handler reentrancy crash that sank the prior attempt.
# The blocking regression guard for that fix is `test_navigation.py`
# (runs under `test:a11y`, which is blocking) — it asserts do_action(0)
# actually transitions screens, independent of pixels.
#
# This pixel-comparison gate stays `allow_failure: true` for now:
# several screens (My Card, Contacts, Activity, …) render data derived
# from the per-run RANDOM test identity (avatars/colours/timestamps), so
# their pixels are not reproducible and the captured set is also
# test-order dependent. Making this gate blocking needs a DETERMINISTIC
# test identity (fixed keys) — tracked as the remaining G2/G3 work in the
# problem record. Until then the job still runs (navigation + distinct-
# capture gate) but does not block.
test:snapshots:
  allow_failure: true
  stage: test
  needs:
    - job: build:app
  tags: [linux, self-hosted]
  variables:
    VRT_PLATFORM: linux-gtk
    VRT_SCREENSHOT_DIR: tests/atspi/snapshots/baseline
  script:
    - chmod +x tests/atspi/run-tests.sh
    - mkdir -p tests/atspi/snapshots/{baseline,actual,diff}
    - tests/atspi/run-tests.sh -v --tb=short -k "test_snapshots"
  after_script:
    # `.vrt-upload-script` now defines `fetch_vauchi_script` itself
    # (vauchi/scripts ci-templates/vrt-upload.yml) — no inline copy needed.
    - !reference [.vrt-upload-script, script]
  artifacts:
    when: always
    paths:
      - tests/atspi/snapshots/baseline/
      - tests/atspi/snapshots/actual/
      - tests/atspi/snapshots/diff/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src/**"
          - "tests/atspi/**"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Manual snapshot regeneration — run via GitLab UI to update baselines.
# Trigger: Pipelines → Run pipeline → REGENERATE_SNAPSHOTS=1
test:snapshots:record:
  stage: test
  needs:
    - job: build:app
  tags: [linux, self-hosted]
  variables:
    UPDATE_SNAPSHOTS: "1"
  script:
    - chmod +x tests/atspi/run-tests.sh
    - tests/atspi/run-tests.sh -v --tb=short -k "test_snapshots"
  artifacts:
    when: always
    paths:
      - tests/atspi/snapshots/baseline/
    expire_in: 90 days
  rules:
    - if: $REGENERATE_SNAPSHOTS == "1"
      when: manual

# Coverage: cargo-llvm-cov on main merges (not MRs)
coverage:workspace:
  extends: [.coverage-job, .linux-runner, .timeout-long]
  before_script:
    - !reference [.self-hosted, before_script]
    - sudo apt-get update -qq && sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev 2>/dev/null || true
  variables:
    COVERAGE_REPO_LABEL: "linux-gtk"
    COVERAGE_EXTRA_FLAGS: "--no-default-features"

# ============================================================
# Security Stage (change-based, parallel with test)
# ============================================================

# Semgrep SAST: gate on Rust changes
semgrep-sast:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.rs"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Rust security audit (runs on dependency changes)
security:audit:
  extends: [.linux-runner-readonly, .security-audit-job]

# Full cargo-deny check: advisories, licenses, bans, sources
security:deny:
  extends: [.linux-runner-readonly, .security-deny-job]

# Binary size tracking (main merges + release tags)
perf:binary-size:
  extends: [.binary-size-tracking-job, .linux-runner, .timeout-long]
  before_script:
    - !reference [.self-hosted, before_script]
  variables:
    BINARY_SIZE_REPO_LABEL: "linux-gtk"

# ============================================================
# Verify Stage (upstream trigger only)
# ============================================================
# Runs when core merges to main and triggers this repo via
# verify:downstream-rust. Verifies this repo builds and tests
# pass against the updated vauchi-core.

# Design drift: verify all design-spec components are implemented
check:design-drift:
  extends: .design-drift-job
  variables:
    DESIGN_DRIFT_COMPONENT_DIR: "src/core_ui/components"

# Design token drift: fully blocking — baseline is 0 for RUST_RGB and
# RUST_EN_STR as of 2026-04-20 (QR constants named + remaining 5
# English strings routed through i18n::get_string). Script lives in
# vauchi/scripts — fetched via API to avoid duplicating it here.
check:design-tokens:
  stage: lint
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/alpine:3.21
  tags: [docker]
  needs: []
  before_script:
    - apk add --no-cache bash findutils grep curl
  script:
    - |
      curl --silent --fail \
        "${CI_API_V4_URL}/projects/vauchi%2Fscripts/repository/files/scripts%2Fcheck-design-tokens.sh/raw?ref=main" \
        -o check-design-tokens.sh
      chmod +x check-design-tokens.sh
    - ./check-design-tokens.sh --strict src/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.rs"
          - ".gitlab-ci.yml"

# Parser-parity gate: verify the hand-rolled Component dispatch in
# `src/core_ui/components/mod.rs` covers every variant declared in
# core's canonical `Component` enum. Catches silent drift when core
# adds a variant.
check:parser-parity:
  extends: .parser-parity-job
  variables:
    FRONTEND_NAME: "linux-gtk"
    PARSER_FILE: "src/core_ui/components/mod.rs"

# Removed symbols: detect stale references to removed features
check:removed-symbols:
  extends: .removed-symbols-job
  variables:
    SEARCH_DIRS: "src/ tests/"
verify:upstream-compat:
  extends: [.linux-runner, .verify-on-upstream, .timeout-standard]
  stage: verify
  needs: []
  before_script:
    - !reference [.self-hosted, before_script]
    - sudo apt-get update -qq && sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev 2>/dev/null || true
  script:
    - cargo nextest run --profile ci
  allow_failure: true  # GTK4 dev libs may not be on all runners

# Runs when core creates a dev/RC tag and triggers this repo.
# Verifies this repo builds and tests pass against the core tag.
verify:upstream-prerelease:
  extends: [.linux-runner, .verify-on-upstream-prerelease, .timeout-standard]
  stage: verify
  needs: []
  before_script:
    - !reference [.self-hosted, before_script]
    - sudo apt-get update -qq && sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev 2>/dev/null || true
  script:
    - cargo nextest run --profile ci
  allow_failure: true  # GTK4 dev libs may not be on all runners

# ============================================================
# Package Stage — build-verification for distro packages
# ============================================================
# Only run on tags or manual trigger — not on every MR.

package:deb:
  stage: package
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/debian:bookworm
  tags: [docker]
  needs:
    - job: build:app
      optional: true
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq devscripts debhelper cargo rustc
        libgtk-4-dev libadwaita-1-dev libqrencode-dev pkg-config
  script:
    - dpkg-buildpackage -us -uc -b
    - mkdir -p deb-out && cp ../*.deb deb-out/
  artifacts:
    paths:
      - deb-out/*.deb
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - when: manual
      allow_failure: true

package:rpm:
  stage: package
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/fedora:40
  tags: [docker]
  needs:
    - job: build:app
      optional: true
  before_script:
    - dnf install -y rpm-build cargo rust gtk4-devel libadwaita-devel
        qrencode-devel pkgconfig
  script:
    - mkdir -p rpmbuild/{SOURCES,SPECS}
    - tar czf rpmbuild/SOURCES/vauchi-gtk-0.5.0.tar.gz
        --transform 's,^,vauchi-gtk-0.5.0/,' --exclude=rpmbuild .
    - cp packaging/vauchi-gtk.spec rpmbuild/SPECS/
    - rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/vauchi-gtk.spec
    - mkdir -p rpm-out && cp rpmbuild/RPMS/**/*.rpm rpm-out/
  artifacts:
    paths:
      - rpm-out/*.rpm
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - when: manual
      allow_failure: true

package:flatpak:
  stage: package
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/bilelmoussaoui/flatpak-github-actions:gnome-47
  tags: [docker]
  needs: []
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  script:
    - flatpak-builder --force-clean --repo=repo build packaging/com.vauchi.desktop.yml
    - flatpak build-bundle repo vauchi-gtk.flatpak com.vauchi.desktop
  artifacts:
    paths:
      - vauchi-gtk.flatpak
    expire_in: 1 week

package:appimage:
  stage: package
  tags: [linux, self-hosted]
  needs: ["build:app"]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  variables:
    DEPLOY_GTK_VERSION: "4"
  before_script:
    - |
      if ! command -v linuxdeploy &>/dev/null; then
        # --retry handles transient GitHub / github.com CDN 5xx-and-HTML-404
        # that otherwise require a whole job rerun. --max-time bounds the
        # job so a hung connection surfaces quickly.
        curl -L --retry 3 --retry-max-time 60 --max-time 120 \
          -o /usr/local/bin/linuxdeploy \
          "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
        chmod +x /usr/local/bin/linuxdeploy
        curl -L --retry 3 --retry-max-time 60 --max-time 60 \
          -o /usr/local/bin/linuxdeploy-plugin-gtk.sh \
          "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
        chmod +x /usr/local/bin/linuxdeploy-plugin-gtk.sh
      fi
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - chmod +x packaging/appimage.sh
    - ./packaging/appimage.sh "$VERSION"
  artifacts:
    paths:
      - "vauchi-gtk-*-x86_64.AppImage"
    expire_in: 1 week

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
