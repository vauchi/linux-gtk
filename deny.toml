# cargo-deny configuration for vauchi-gtk (Linux GTK4 frontend)
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
]

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # paste is unmaintained — transitive via uniffi. No action available.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
allow = [
    "GPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",  # webpki-roots (Mozilla CA certs)
    "OpenSSL",              # aws-lc-sys (BoringSSL fork, FIPS 140-3)
    "LGPL-2.1-or-later",   # GTK4 bindings
    "IJG",                  # libjpeg (image crate, camera feature)
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "warn"  # git deps (vauchi-core) have no version spec
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

deny = [
    # No direct openssl usage
    { name = "openssl", wrappers = ["native-tls"] },
    { name = "openssl-sys", wrappers = ["native-tls", "openssl"] },
]

skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://gitlab.com/vauchi/core.git"]
